<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Paper backdrop -->
  <rect width="64" height="64" rx="14" fill="#FAF7F2"/>
  <!-- Thin gold border -->
  <rect x="3" y="3" width="58" height="58" rx="11" fill="none" stroke="#C9A66B" stroke-width="1.2" opacity="0.5"/>
  <!-- Monogram "M&H" — the invitation's signature mark.
       Script style, ink colour, slightly larger to fill the frame. -->
  <text x="50%" y="58%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="'Apple Chancery', 'Parisienne', 'Brush Script MT', cursive"
        font-size="30"
        fill="#3D2E35">
    M&amp;H
  </text>
</svg>
